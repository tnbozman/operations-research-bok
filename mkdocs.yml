site_name: Operations Research Body of Knowledge
site_description: A quick-start guide to Operations Research for engineers, with a focus on military operations applications.
site_author: Operations Research BoK Contributors
repo_url: https://github.com/tnbozman/operations-research-bok
repo_name: tnbozman/operations-research-bok

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Military Operations:
    - Overview: military-operations/overview.md
    - Army Operations: military-operations/army-operations.md
    - Navy Operations: military-operations/navy-operations.md
    - Air Operations: military-operations/air-operations.md
    - Space Operations: military-operations/space-operations.md
    - Cyber Operations: military-operations/cyber-operations.md
    - Multi-Domain Operations: military-operations/multi-domain-operations.md
